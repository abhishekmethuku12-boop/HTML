<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>Register</title>
	<style>
		body{font-family:Segoe UI,Arial,Helvetica,sans-serif;background:#f4f7fb;padding:32px}
		.card{max-width:480px;margin:0 auto;background:#fff;border-radius:8px;padding:24px;box-shadow:0 6px 18px rgba(20,30,50,0.08)}
		h1{margin:0 0 12px;font-size:20px}
		label{display:block;margin:12px 0 6px;font-weight:600}
		input[type="text"],input[type="email"],input[type="tel"],input[type="date"],input[type="password"],select{width:100%;padding:10px;border:1px solid #d8e0ea;border-radius:6px}
		.row{display:flex;gap:12px}
		.row > *{flex:1}
		.actions{margin-top:18px;display:flex;align-items:center;justify-content:space-between}
		.btn{background:#1366d6;color:#fff;padding:10px 16px;border:none;border-radius:6px;cursor:pointer}
		.hint{font-size:13px;color:#6b7280}
		.error{color:#b91c1c;font-size:13px}
	</style>
</head>
<body>
	<div class="card">
		<h1>Create an account</h1>
		<form id="regForm" onsubmit="return validateForm();" novalidate>
			<label for="email">Email</label>
			<input id="email" name="email" type="email" placeholder="you@example.com" required />

			<label for="mobile">Mobile</label>
			<input id="mobile" name="mobile" type="tel" placeholder="e.g. 1234567890" pattern="[0-9]{10}" required />
			<div class="hint">Enter 10 digits, numbers only.</div>

			<div class="row">
				<div>
					<label for="dob">Date of birth</label>
					<input id="dob" name="dob" type="date" required />
				</div>
				<div>
					<label for="gender">Gender</label>
					<select id="gender" name="gender" required>
						<option value="">Select</option>
						<option value="female">Female</option>
						<option value="male">Male</option>
						<option value="other">Other</option>
						<option value="prefer_not">Prefer not to say</option>
					</select>
				</div>
			</div>

			<label for="password">Password</label>
			<input id="password" name="password" type="password" minlength="8" placeholder="At least 8 characters" required />

			<label for="confirm">Confirm password</label>
			<input id="confirm" name="confirm" type="password" minlength="8" required />

			<div id="msg" class="error" role="status" aria-live="polite"></div>

			<div class="actions">
				<div class="hint">By creating an account you agree to our Terms.</div>
				<button class="btn" type="submit">Register</button>
			</div>
		</form>
	</div>

	<script>
		function validateForm(){
			const form = document.getElementById('regForm');
			const email = form.email.value.trim();
			const mobile = form.mobile.value.trim();
			const dob = form.dob.value;
			const gender = form.gender.value;
			const password = form.password.value;
			const confirm = form.confirm.value;
			const msg = document.getElementById('msg');
			msg.textContent = '';

			if(!email){ msg.textContent = 'Please enter your email.'; return false; }
			if(!/^\S+@\S+\.\S+$/.test(email)){ msg.textContent = 'Please enter a valid email address.'; return false; }
			if(!/^[0-9]{10}$/.test(mobile)){ msg.textContent = 'Mobile must be 10 digits.'; return false; }
			if(!dob){ msg.textContent = 'Please enter your date of birth.'; return false; }
			if(!gender){ msg.textContent = 'Please select your gender.'; return false; }
			if(password.length < 8){ msg.textContent = 'Password must be at least 8 characters.'; return false; }
			if(password !== confirm){ msg.textContent = 'Passwords do not match.'; return false; }

			// If you want to submit to a server, replace this with fetch/XHR
			alert('Registration successful (demo).');
			form.reset();
			return false;
		}
	</script>
</body>
</html>
